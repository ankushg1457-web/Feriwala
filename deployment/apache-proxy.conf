ProxyRequests Off
ProxyPreserveHost On
ProxyVia Full

# Enable mod_proxy modules (already enabled in Bitnami)
# Proxy /api and /socket.io to Node.js backend
<VirtualHost *:80>
    ServerName 13.233.227.15

    # Proxy API requests to Node.js
    ProxyPass /api/ http://127.0.0.1:3000/api/
    ProxyPassReverse /api/ http://127.0.0.1:3000/api/

    # Proxy Socket.IO (WebSocket upgrade)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(socket\.io/.*)$ ws://127.0.0.1:3000/$1 [P,L]

    ProxyPass /socket.io/ http://127.0.0.1:3000/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:3000/socket.io/

    # Proxy file uploads
    ProxyPass /uploads/ http://127.0.0.1:3000/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:3000/uploads/

    # Admin portal static files
    DocumentRoot "/home/bitnami/feriwala/admin-portal/build"
    <Directory "/home/bitnami/feriwala/admin-portal/build">
        Options -Indexes
        AllowOverride None
        Require all granted
        # SPA fallback
        FallbackResource /index.html
    </Directory>

    ErrorLog "/opt/bitnami/apache/logs/feriwala-error.log"
    CustomLog "/opt/bitnami/apache/logs/feriwala-access.log" combined
</VirtualHost>
