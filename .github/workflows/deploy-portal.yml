name: Deploy Shop Owner Portal

on:
  push:
    branches: [main]
    paths:
      - 'admin-portal/**'
      - 'deployment/nginx.conf'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

jobs:
  deploy-portal:
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_INSTANCE_NAME: ${{ vars.AWS_LIGHTSAIL_INSTANCE_NAME || secrets.AWS_LIGHTSAIL_INSTANCE_NAME || 'Feriwala' }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'ap-south-1' }}
      SSH_USER: bitnami
      SSH_HOST: 65.2.9.216
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-portal/package-lock.json

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'ap-south-1' }}

      - name: Install portal dependencies
        working-directory: admin-portal
        run: npm install --no-audit --no-fund

      - name: Build portal
        working-directory: admin-portal
        run: npm run build

      - name: Upload built portal artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-owner-portal-build
          path: admin-portal/build
          retention-days: 7

      - name: Resolve server SSH access
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -n "$LIGHTSAIL_SSH_KEY" ]; then
            printf '%s' "$LIGHTSAIL_SSH_KEY" | tr -d '\r' > lightsail.pem
            chmod 600 lightsail.pem
            {
              echo "SSH_USER=$SSH_USER"
              echo "SSH_HOST=$SSH_HOST"
              echo "SSH_OPTS=-i lightsail.pem -o StrictHostKeyChecking=no"
            } >> "$GITHUB_ENV"
          elif aws sts get-caller-identity >/dev/null 2>&1; then
            aws lightsail get-instance-access-details \
              --region "$AWS_REGION" \
              --instance-name "$LIGHTSAIL_INSTANCE_NAME" \
              > access.json
            python - <<'PY' >> "$GITHUB_ENV"
            import json
            from pathlib import Path
            payload = json.loads(Path('access.json').read_text())
            details = payload['accessDetails']
            Path('lightsail.pem').write_text(details['privateKey'])
            cert = details.get('certKey', '')
            if cert:
                Path('lightsail-cert.pub').write_text(cert + '\n')
            print(f"SSH_USER={details.get('username', 'bitnami')}")
            print(f"SSH_HOST={details.get('ipAddress', '65.2.9.216')}")
            print("SSH_OPTS=-i lightsail.pem -o CertificateFile=lightsail-cert.pub -o StrictHostKeyChecking=no")
            PY
            chmod 600 lightsail.pem
          else
            echo "::error::Missing AWS credentials and LIGHTSAIL_SSH_KEY. Configure AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY or LIGHTSAIL_SSH_KEY, then rerun this workflow."
            exit 1
          fi

      - name: Ensure remote directories exist
        run: |
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "mkdir -p /home/bitnami/feriwala/admin-portal/build"

      - name: Sync built portal
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            admin-portal/build/ "$SSH_USER@$SSH_HOST:/home/bitnami/feriwala/admin-portal/build/"

      - name: Refresh nginx and verify
        run: |
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "sudo nginx -t && sudo systemctl reload nginx"
          curl --fail --silent --show-error http://65.2.9.216/ > /tmp/portal.html
          grep -q 'Feriwala Portal' /tmp/portal.html

      - name: Cleanup key
        if: always()
        run: rm -f lightsail.pem lightsail-cert.pub access.json
